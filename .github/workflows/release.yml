name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            os: macos-latest
            bun_target: bun-darwin-arm64
          - target: darwin-x64
            os: macos-15-intel
            bun_target: bun-darwin-x64
          - target: linux-x64
            os: ubuntu-latest
            bun_target: bun-linux-x64
          - target: linux-arm64
            os: ubuntu-latest
            bun_target: bun-linux-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun build src/index.ts --compile --target=${{ matrix.bun_target }} --outfile dist/worktree-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: worktree-${{ matrix.target }}
          path: dist/worktree-${{ matrix.target }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: chmod +x artifacts/worktree-*

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/worktree-*
